<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WallyWonkaa51</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<main class="app">

  <section id="home" class="page active">

    <div class="top-logo">
      <img src="logo.jpg" alt="Logo">
    </div>

    <button class="category-btn" onclick="toggleCategories()">
      CATEGORIE <span>▼</span>
    </button>

    <div id="categoryMenu" class="dropdown">
      <button onclick="showPage('cat1')">🍫 WEED & HASH </button>
      <button onclick="showPage('cat2')">❄️ MASH & KEHLA </button>
      <button onclick="showPage('menu')">🎩 Voir le menu</button>
      <button onclick="showPage('livraison')">🚚 Zone de livraison</button>
    </div>

    <div class="big-card" onclick="showPage('cat1')">
      <img src="Catégorie1.jpg.PNG" alt="Catégorie 1">
    </div>

    <div class="big-card" onclick="showPage('cat2')">
      <img src="Catégorie2.jpg.PNG" alt="Catégorie 2">
    </div>

  </section>

  <section id="cat1" class="page">
    <h1>🍫 WEED & HASH </h1>
    <img class="full-img" src="Catégorie1.jpg.PNG">
    <button class="gold-btn" onclick="showPage('home')">⬅ Retour</button>
  </section>

  <section id="cat2" class="page">
    <h1> ❄️MASH & KEHLA </h1>
    <img class="full-img" src="Catégorie2.jpg.PNG">
    <button class="gold-btn" onclick="showPage('home')">⬅ Retour</button>
  </section>

  <section id="menu" class="page">
    <h1>🎩 Menu</h1>
    <img class="full-img" src="image.jpeg">
    <button class="gold-btn" onclick="showPage('home')">⬅ Retour</button>
  </section>

  <section id="livraison" class="page">
    <h1>🚚 Zone de livraison</h1>
    <img class="full-img" src="livraison.jpg">
    <button class="gold-btn" onclick="showPage('home')">⬅ Retour</button>
  </section>

  <section id="links" class="page">
    <h1>🔗 Links</h1>
    <a class="link-btn" href="#">Telegram</a>
    <a class="link-btn" href="#">Instagram</a>
    <a class="link-btn" href="#">Snapchat</a>
    <a class="link-btn" href="#">Contact</a>
  </section>

</main>

<nav>
  <button onclick="showPage('home')">⌂<span>HOME</span></button>
  <button onclick="showPage('links')">🔗<span>LINKS</span></button>
</nav>

<script src="script.js"></script>
</body>
</html>
