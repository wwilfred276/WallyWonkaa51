<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WallyWonkaa51</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="background"></div>

<main class="app">

  <section id="home" class="page active">
    <header>
      <h1>WallyWonkaa51</h1>
      <p>Mini-application officielle</p>
    </header>

    <img class="logo" src="logo.jpg">

    <button class="select-btn">CATÉGORIE ▾</button>

    <div class="card" onclick="showPage('menu')">
      <img src="image.jpeg">
      <h2> 🎩 Voir le menu</h2>
    </div>

    <div class="card" onclick="showPage('livraison')">
      <img src="livraison.jpg">
      <h2>🚚 Zone de livraison</h2>
    </div>
  </section>

  <section id="menu" class="page">
    <h2>🎩 Menu</h2>
<img class="full-img" src="image.jpeg">
  </section>

  <section id="livraison" class="page">
    <h2>🚚 Zone de livraison</h2>
    <img class="full-img" src="livraison.jpg">
  </section>

  <section id="links" class="page">
    <h2>🔗 Nos réseaux</h2>
    <a class="link" href="#">Telegram</a>
    <a class="link" href="#">Instagram</a>
    <a class="link" href="#">Snapchat</a>
    <a class="link" href="#">Contact</a>
  </section>

</main>

<nav>
  <button onclick="showPage('home')">🏠<span>Accueil</span></button>
  <button onclick="showPage('menu')">🎩<span>Menu</span></button>
  <button onclick="showPage('livraison')">🚚<span>Livraison</span></button>
  <button onclick="showPage('links')">🔗<span>Liens</span></button>
</nav>

<script src="script.js"></script>
</body>
</html>
